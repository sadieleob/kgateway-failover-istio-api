###############################################################################
# ServiceEntry + DestinationRule Failover Demo
#
# Uses Istio ServiceEntry to aggregate multiple regional backends under one
# abstract hostname, with DestinationRule for outlier detection + locality
# failover. Requires enterprise-kgateway with KGW_ENABLE_ISTIO_INTEGRATION=true.
#
# Architecture:
#   backend-west2 svc (us-west-2) --> nginx-primary pods (PRIMARY)
#   backend-east1 svc (us-east-1) --> nginx-failover pods (FAILOVER)
#   ServiceEntry aggregates both under one abstract hostname
#   DestinationRule enables outlier detection + locality failover
#
# Ref: https://github.com/solo-io/gloo-gateway/issues/72
###############################################################################

# --- ConfigMaps for distinct nginx responses ---
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-primary-html
  namespace: failover-demo
data:
  index.html: |
    You hit PRIMARY (v1)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-failover-html
  namespace: failover-demo
data:
  index.html: |
    You hit FAILOVER (v2)

# --- Primary Deployment (v1) - 2 replicas in us-west-2 (same region as proxy) ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-primary
  namespace: failover-demo
  labels:
    app: nginx-failover
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-failover
      version: v1
  template:
    metadata:
      labels:
        app: nginx-failover
        version: v1
    spec:
      nodeSelector:
        topology.kubernetes.io/region: us-west-2
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: nginx-primary-html

# --- Failover Deployment (v2) - 1 replica in us-east-1 (different region) ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-failover
  namespace: failover-demo
  labels:
    app: nginx-failover
    version: v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-failover
      version: v2
  template:
    metadata:
      labels:
        app: nginx-failover
        version: v2
    spec:
      nodeSelector:
        topology.kubernetes.io/region: us-east-1
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: nginx-failover-html

# --- Separate Service for PRIMARY backend (simulates region-specific DNS) ---
---
apiVersion: v1
kind: Service
metadata:
  name: backend-west2
  namespace: failover-demo
spec:
  selector:
    app: nginx-failover
    version: v1
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP

# --- Separate Service for FAILOVER backend (simulates region-specific DNS) ---
---
apiVersion: v1
kind: Service
metadata:
  name: backend-east1
  namespace: failover-demo
spec:
  selector:
    app: nginx-failover
    version: v2
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP

# --- ServiceEntry: aggregates both regional backends under one hostname ---
# This is the key piece: different DNS names per region, grouped as one service
---
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: multi-region-backend
  namespace: failover-demo
spec:
  hosts:
  - multi-region-backend.internal
  ports:
  - number: 80
    name: http
    protocol: HTTP
  resolution: DNS
  location: MESH_INTERNAL
  endpoints:
  - address: backend-west2.failover-demo.svc.cluster.local
    locality: us-west-2/us-west-2a
    ports:
      http: 80
  - address: backend-east1.failover-demo.svc.cluster.local
    locality: us-east-1/us-east-1a
    ports:
      http: 80

# --- DestinationRule for locality-based failover on the ServiceEntry ---
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: multi-region-backend-dr
  namespace: failover-demo
spec:
  host: multi-region-backend.internal
  trafficPolicy:
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 100
    loadBalancer:
      localityLbSetting:
        failoverPriority:
        - "topology.kubernetes.io/region"

# --- Gateway ---
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: failover-demo-gw
  namespace: kgateway-system
spec:
  gatewayClassName: enterprise-kgateway
  listeners:
  - name: http
    port: 8080
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All

# --- HTTPRoute referencing ServiceEntry via Hostname backendRef ---
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: se-failover-route
  namespace: failover-demo
spec:
  parentRefs:
  - name: failover-demo-gw
    namespace: kgateway-system
  hostnames:
  - "se-failover.example.com"
  rules:
  - backendRefs:
    - name: multi-region-backend.internal
      port: 80
      kind: Hostname
      group: networking.istio.io
